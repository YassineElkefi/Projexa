<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="10" fill="#0f0f0f" />
        <path d="M9 16L14 21L23 11" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      <span>Projexa</span>
      <span class="role-tag">Member</span>
    </div>

    <nav class="nav">
      <a class="nav-item" routerLink="/dashboard/member" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }">
        <span class="material-symbols-outlined nav-ico">home</span>
        Home
      </a>
      <a class="nav-item" routerLink="/dashboard/member/projects" routerLinkActive="active">
        <span class="material-symbols-outlined nav-ico">assignment</span>
        My projects
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">{{ userName ? userName[0].toUpperCase() : 'U' }}</div>
        <div class="user-info">
          <span class="user-name">{{ userName || 'User' }}</span>
          <span class="user-role">Member</span>
        </div>
      </div>
      <button type="button" class="logout-btn" (click)="logout()" title="Logout">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="main-topbar">
      <app-notification-bell />
    </header>
    <router-outlet />
  </main>
</div>
