<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="10" fill="#0f0f0f" />
        <path
          d="M9 16L14 21L23 11"
          stroke="#e8ff47"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span>Projexa</span>
      <span class="role-tag">Lead</span>
    </div>

    <nav class="nav">
      <a
        class="nav-item"
        routerLink="/dashboard/lead"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="material-symbols-outlined nav-ico">grid_view</span>
        Overview
      </a>
      <a class="nav-item" routerLink="/dashboard/lead/projects" routerLinkActive="active">
        <span class="material-symbols-outlined nav-ico">folder_open</span>
        Projects
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">{{ userName ? userName[0].toUpperCase() : 'U' }}</div>
        <div class="user-info">
          <span class="user-name">{{ userName || 'User' }}</span>
          <span class="user-role">Team lead</span>
        </div>
      </div>
      <button type="button" class="logout-btn" (click)="logout()" title="Logout">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <router-outlet />
  </main>
</div>
